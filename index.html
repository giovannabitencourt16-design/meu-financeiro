<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Meu Financeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
    <body>
        <div id="toast" class="toast"></div>
        <main class="auth"><section class="auth-card">
            <div class="brand"><div class="logo">R$</div>
            <div>
                <h1>Meu Financeiro</h1>
                <p>Organize suas finanças</p>
            </div>
        </div>
        <div class="tabs">
            <button id="loginTab" class="tab active">Entrar</button>
            <button id="registerTab" class="tab">Criar conta</button>
        </div>
        <form id="loginForm" class="stack">
        <label>E-mail<input id="loginEmail" type="email" required></label>
        <label>Senha<input id="loginPassword" type="password" minlength="6" required></label>
        <button class="btn primary full">Entrar</button>
    </form>
    <form id="registerForm" class="stack hidden"><label>Nome<input id="registerName" required></label>
        <label>E-mail<input id="registerEmail" type="email" required></label>
        <label>Senha<input id="registerPassword" type="password" minlength="6" required></label>
        <button class="btn primary full">Criar conta</button></form>
    </section>
</main>
<script type="module" src="js/auth.js"></script>
</body>




</html>
