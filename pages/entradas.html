<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entradas | Meu Financeiro</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/style.css"></head><body data-page="entradas"><div id="toast" class="toast"></div><aside id="sidebar" class="sidebar"><div class="brand"><div class="logo">R$</div><div><h2>Meu Financeiro</h2><small>Controle pessoal</small></div></div><nav class="nav"><a data-page="dashboard" href="dashboard.html">🏠 Dashboard</a><a data-page="entradas" href="entradas.html">💰 Entradas</a><a data-page="contas" href="contas.html">📄 Contas a pagar</a><a data-page="relatorios" href="relatorios.html">📊 Relatório mensal</a><a data-page="configuracoes" href="configuracoes.html">⚙️ Configurações</a></nav><div class="user"><div class="user-row"><div id="userInitial" class="avatar">U</div><div><strong id="userName">Usuário</strong><small id="userEmail"></small></div></div><button id="logoutButton" class="btn full">Sair</button></div></aside><main class="main"><header class="topbar"><button id="menuButton" class="menu">☰</button><div><h1>Entradas</h1><p>Cadastre o dinheiro que entrou.</p></div></header><section class="actions"><label>Mês<input id="entryMonth" type="month"></label><button id="newEntry" class="btn primary">+ Nova entrada</button></section><section class="card"><div class="section-head"><div><h2>Entradas cadastradas</h2><p id="entrySummary"></p></div></div><div id="entriesList"></div></section><div id="entryModal" class="modal hidden"><div id="entryBackdrop" class="backdrop"></div><div class="modal-card"><div class="modal-head"><h2>Nova entrada</h2><button id="closeEntry">×</button></div><form id="entryForm" class="form-grid"><input id="entryId" type="hidden"><label class="span2">Descrição<input id="entryDescription" required></label><label>Valor<input id="entryAmount" type="number" min=".01" step=".01" required></label><label>Data<input id="entryDate" type="date" required></label><label class="span2">Observação<textarea id="entryNotes"></textarea></label><div class="modal-actions span2"><button id="cancelEntry" type="button" class="btn">Cancelar</button><button class="btn primary">Salvar</button></div></form></div></div></main><script type="module" src="../js/entradas.js"></script></body></html>
